<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>垃圾車即時追蹤與警報系統</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <!-- Custom Styling -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon">🚛</div>
        <div>
          <h1>垃圾車即時追蹤警報</h1>
          <p class="subtitle">個人警報設置系統</p>
        </div>
      </div>
      <div class="status-indicator">
        <span class="pulse-dot idle" id="statusDot"></span>
        <span class="status-text" id="statusText">系統初始化中...</span>
      </div>
    </header>

    <div class="main-layout">
      <!-- Sidebar / Settings -->
      <aside class="sidebar">

        <!-- 我的 User ID & LINE 綁定 -->
        <section class="card user-id-card">
          <h2>我的設置</h2>
          <div class="form-group">
            <label for="myUserId">我的 LINE User ID</label>
            <input type="text" id="myUserId" placeholder="U開頭的長字符串" readonly style="background-color: #f0f0f0; cursor: not-allowed;">
            <small style="color: var(--text-muted); margin-top: 0.25rem;">或手動輸入:</small>
            <input type="text" id="myUserIdInput" placeholder="手動輸入你的 User ID">
          </div>
        </section>

        <!-- 用戶警報設置 -->
        <section class="card settings-card">
          <h2>我的警報設置</h2>
          <!-- Map Click Mode Selector -->
          <div class="form-group">
            <label>地圖點擊設定目標</label>
            <div class="radio-group" style="display: flex; gap: 1rem; margin-top: 0.25rem;">
              <label style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; cursor: pointer;">
                <input type="radio" name="clickMode" value="alertPoint" checked> 警報點
              </label>
              <label style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; cursor: pointer;">
                <input type="radio" name="clickMode" value="home"> 住家
              </label>
            </div>
          </div>

          <!-- Alert Point Coordinates -->
          <div class="form-row">
            <div class="form-group">
              <label for="alertLat">警報點緯度</label>
              <input type="number" id="alertLat" step="any" value="24.659710035666908">
            </div>
            <div class="form-group">
              <label for="alertLng">警報點經度</label>
              <input type="number" id="alertLng" step="any" value="121.82424418663483">
            </div>
          </div>

          <!-- Radius -->
          <div class="form-group">
            <label for="alertRadius">警報範圍半徑 (公尺)</label>
            <input type="number" id="alertRadius" value="200" min="50" max="2000">
          </div>

          <!-- Time Filter -->
          <div class="form-group">
            <label for="alertAfterTime">在此時間後提醒</label>
            <input type="time" id="alertAfterTime" value="00:00">
          </div>

          <!-- Street Filter -->
          <div class="form-group">
            <label for="streetFilter">指定路段/街名 (選填)</label>
            <input type="text" id="streetFilter" placeholder="例如：礁溪路">
          </div>

          <!-- 綁定到 LINE 按鈕 -->
          <button id="bindLineBotBtn" class="btn btn-primary">綁定到 LINE 並開始接收警報</button>
        </section>

        <!-- 通知控制 -->
        <section class="card notification-card">
          <h2>本地警報設置</h2>
          <div class="btn-group">
            <button id="requestNotificationBtn" class="btn btn-outline">啟用瀏覽器通知</button>
            <button id="testAlarmBtn" class="btn btn-outline">測試警報</button>
          </div>
          <div class="toggle-group">
            <label class="switch-container">
              <input type="checkbox" id="enableVoice" checked>
              <span class="switch-slider"></span>
              開啟語音播報
            </label>
            <label class="switch-container">
              <input type="checkbox" id="enableSound" checked>
              <span class="switch-slider"></span>
              開啟警報音效
            </label>
          </div>
        </section>

        <!-- 警報記錄 -->
        <section class="card log-card">
          <h2>系統訊息</h2>
          <div class="alert-list" id="alertList">
            <div class="empty-log">尚無系統訊息</div>
          </div>
        </section>

        <!-- 管理員設置 (折叠) -->
        <section class="card admin-card">
          <h2>
            <span onclick="toggleAdminPanel()" style="cursor: pointer;">
              ⚙️ 管理員設置
              <span id="adminToggle">▼</span>
            </span>
          </h2>
          <div id="adminPanel" style="display: none; margin-top: 1rem;">
            <div class="form-group">
              <label for="lineChannelToken">Channel Access Token</label>
              <input type="password" id="lineChannelToken" placeholder="輸入你的 Channel Access Token">
            </div>
            <div class="form-group">
              <label for="lineChannelSecret">Channel Secret</label>
              <input type="password" id="lineChannelSecret" placeholder="輸入你的 Channel Secret">
            </div>
            <button id="saveAdminBtn" class="btn btn-primary">保存管理員設置</button>
            <div style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted);">
              <p>只需設置一次。系統會向已綁定的用戶廣播警報。</p>
            </div>
          </div>
        </section>

      </aside>

      <!-- Map & Truck List -->
      <main class="content-area">
        <!-- Interactive Map -->
        <section class="card map-card">
          <div id="map"></div>
        </section>

        <!-- Active Trucks Grid -->
        <section class="card list-card">
          <h2>垃圾車即時狀態 (<span id="truckCount">0</span>)</h2>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>車牌號碼</th>
                  <th>類型</th>
                  <th>更新時間</th>
                  <th>距離</th>
                  <th>狀態</th>
                </tr>
              </thead>
              <tbody id="truckTableBody">
                <tr>
                  <td colspan="5" style="text-align: center; color: var(--text-muted);">等待資料載入...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Audio elements for alerts -->
  <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav" preload="auto"></audio>

  <!-- Leaflet Map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Main Script -->
  <script src="app.js"></script>
</body>
</html>
